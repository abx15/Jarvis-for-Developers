apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-config
data:
  ENVIRONMENT: 'production'
  DATABASE_URL: 'postgresql://user:pass@db-host:5432/dbname'
  REDIS_HOST: 'redis-service'
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
