name: Jarvis CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/requirements.txt

      - name: Run unit tests
        run: |
          pytest apps/api/tests/

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v2

      - name: Build and Push Docker images
        run: |
          # In a real scenario, you'd use docker buildx and push to a registry like ECR/GCR/DockerHub
          echo "Building and pushing microservice images..."
          docker build -t jarvis/api-gateway -f apps/api/gateway/Dockerfile .
          docker build -t jarvis/agent-service -f services/agent-service/Dockerfile .
          # ... and so on for all services

  deploy-to-kubernetes:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to K8s cluster
        run: |
          kubectl apply -f infra/kubernetes/
          kubectl rollout status deployment/api-gateway
