services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - jarvis-network
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_In3fFgkR5KTa@ep-wandering-night-a4zi29rn-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - SERVICE_NAME=agent-service
      - DATABASE_URL=postgresql://neondb_owner:npg_In3fFgkR5KTa@ep-wandering-night-a4zi29rn-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  repo-service:
