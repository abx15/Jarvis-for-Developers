version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: apps/api/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - AGENT_SERVICE_URL=http://agent-service:8001
      - REPO_SERVICE_URL=http://repo-service:8002
      - BUG_SERVICE_URL=http://bug-service:8003
      - DEVOPS_SERVICE_URL=http://devops-service:8004
      - BILLING_SERVICE_URL=http://billing-service:8005
    depends_on:
      - redis
      - agent-service
      - repo-service
      - bug-service
      - devops-service
      - billing-service

  agent-service:
    build: 
      context: .
      dockerfile: services/agent-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis

  repo-service:
    build:
      context: .
      dockerfile: services/repo-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis

  bug-service:
    build:
      context: .
      dockerfile: services/bug-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis

  devops-service:
    build:
      context: .
      dockerfile: services/devops-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - REDIS_HOST=redis

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - REDIS_HOST=redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
